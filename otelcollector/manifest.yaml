providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.58.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.58.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.58.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.58.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.58.0

replaces:
  # EDOT transitive deps resolved by OCB to versions incompatible with contrib v0.152.0:
  #   elasticattr v0.40.0 — missing MetadataDynamicResourceAttributes
  #   lsmintervalprocessor v0.8.0 — *TransformContext pointer API breakage
  - github.com/elastic/opentelemetry-collector-components/internal/elasticattr v0.40.0 => github.com/elastic/opentelemetry-collector-components/internal/elasticattr v0.50.0
  - github.com/elastic/opentelemetry-collector-components/processor/lsmintervalprocessor v0.8.0 => github.com/elastic/opentelemetry-collector-components/processor/lsmintervalprocessor v0.50.0
  # The custom receiver pulls pkg/stanza which upgrades coreinternal to v0.155.0.
  # ottlfuncs@v0.152.0 needs timeutils.StrptimeToGotime which was removed in v0.155.0.
  - github.com/open-telemetry/opentelemetry-collector-contrib/internal/coreinternal v0.155.0 => github.com/open-telemetry/opentelemetry-collector-contrib/internal/coreinternal v0.152.0
  - github.com/open-telemetry/opentelemetry-collector-contrib/pkg/stanza v0.155.0 => github.com/open-telemetry/opentelemetry-collector-contrib/pkg/stanza v0.152.0
