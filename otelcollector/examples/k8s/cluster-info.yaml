apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-info
  # ConfigMaps are namespace-scoped. Apply this to every collector namespace:
  #   kubectl apply -f cluster-info.yaml -n otel-collector
  #   kubectl apply -f cluster-info.yaml -n otel-gateway
data:
  # OTel semantic conventions — https://opentelemetry.io/docs/specs/semconv/resource/
  k8s.cluster.name: <CLUSTER_NAME>           # e.g. aks-prod-eastus
  cloud.provider: azure
  cloud.platform: azure_aks
  cloud.region: <AZURE_REGION>               # e.g. eastus
  deployment.environment.name: <ENVIRONMENT> # e.g. production
