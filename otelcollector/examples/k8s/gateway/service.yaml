apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  namespace: otel-gateway
  labels:
    app: otel-gateway
spec:
  # ClusterIP — gateway pulls from Event Hub, no inbound data path needed
  type: ClusterIP
  selector:
    app: otel-gateway
  ports:
  - name: health
    port: 13133
    targetPort: health
    protocol: TCP
