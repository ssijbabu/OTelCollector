apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: otel-gateway
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      azure_auth:
        workload_identity:
          client_id: ${env:AZURE_CLIENT_ID}
          tenant_id: ${env:AZURE_TENANT_ID}
          federated_token_file: ${env:AZURE_FEDERATED_TOKEN_FILE}

    receivers:
      # Kafka protocol: multiple gateway replicas share the same consumer group per topic,
      # so Event Hub distributes partitions across them automatically.
      azure_event_hub/logs:
        protocol: kafka
        event_hub:
          namespace: ${env:EVENTHUB_NAMESPACE}
          name: ${env:EVENTHUB_LOGS_HUB_NAME}
        auth: azure_auth
        group: otel-gateway-logs

      azure_event_hub/metrics:
        protocol: kafka
        event_hub:
          namespace: ${env:EVENTHUB_NAMESPACE}
          name: ${env:EVENTHUB_METRICS_HUB_NAME}
        auth: azure_auth
        group: otel-gateway-metrics

      azure_event_hub/traces:
        protocol: kafka
        event_hub:
          namespace: ${env:EVENTHUB_NAMESPACE}
          name: ${env:EVENTHUB_TRACES_HUB_NAME}
        auth: azure_auth
        group: otel-gateway-traces

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 800
        spike_limit_mib: 200

      # Re-stamp cluster identity in case upstream signals are missing it.
      # Uses insert so attributes already set by the collector are not overwritten.
      resource/cluster:
        attributes:
        - key: k8s.cluster.name
          value: ${env:K8S_CLUSTER_NAME}
          action: insert
        - key: cloud.provider
          value: ${env:CLOUD_PROVIDER}
          action: insert
        - key: cloud.platform
          value: ${env:CLOUD_PLATFORM}
          action: insert
        - key: cloud.region
          value: ${env:CLOUD_REGION}
          action: insert
        - key: deployment.environment.name
          value: ${env:DEPLOYMENT_ENVIRONMENT}
          action: insert

      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: 5s

    exporters:
      # Replace with production backends:
      #   elasticsearch, prometheus, jaeger, otlp, etc.
      debug:
        verbosity: normal

    service:
      extensions: [health_check, azure_auth]

      telemetry:
        logs:
          level: warn

      pipelines:
        logs:
          receivers: [azure_event_hub/logs]
          processors: [memory_limiter, resource/cluster, batch]
          exporters: [debug]
        metrics:
          receivers: [azure_event_hub/metrics]
          processors: [memory_limiter, resource/cluster, batch]
          exporters: [debug]
        traces:
          receivers: [azure_event_hub/traces]
          processors: [memory_limiter, resource/cluster, batch]
          exporters: [debug]
