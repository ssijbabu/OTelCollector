apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: logstash
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      serviceAccountName: logstash
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.17.3
        env:
        - name: EVENTHUB_NAMESPACE
          value: "<EVENTHUB_NAMESPACE>"
        - name: EVENTHUB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: logstash-eventhub
              key: connection-string
        # Bound JVM heap so the container stays within memory limits.
        - name: LS_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 1536Mi
        ports:
        - name: http
          containerPort: 9600
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
          timeoutSeconds: 10
        volumeMounts:
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline
        - name: settings
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
      volumes:
      - name: pipeline
        configMap:
          name: logstash-pipeline
      - name: settings
        configMap:
          name: logstash-settings
