apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: elastiflix
data:
  default.conf: |
    server {
        listen       9000;
        server_name  localhost;
        root /usr/share/nginx/html;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls to node-server; static upstream avoids resolver dependency.
        location /api {
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://node-server.elastiflix.svc.cluster.local:3001;
        }
        location /search {
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://node-server.elastiflix.svc.cluster.local:3001;
        }
        location /autocomplete {
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://node-server.elastiflix.svc.cluster.local:3001;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: javascript-client
  namespace: elastiflix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: javascript-client
  template:
    metadata:
      labels:
        app: javascript-client
    spec:
      containers:
      - name: javascript-client
        image: docker.elastic.co/demos/workshop/observability/elastiflix-javascript-client-elastic-manual:8.9.0-10
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: javascript-client
  namespace: elastiflix
spec:
  type: NodePort
  selector:
    app: javascript-client
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30562
