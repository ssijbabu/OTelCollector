apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-favorite
  namespace: elastiflix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-favorite
  template:
    metadata:
      labels:
        app: python-favorite
    spec:
      containers:
      - name: python-favorite
        image: docker.elastic.co/demos/workshop/observability/elastiflix-python-favorite-otel-auto:8.9.0-10
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_HOST
          value: redis.elastiflix.svc.cluster.local
        - name: OTEL_SERVICE_NAME
          value: python-favorite
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.otel-collector.svc.cluster.local:4317
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.version=1.0,deployment.environment=production
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_METRICS_EXPORTER
          value: otlp
        - name: TOGGLE_SERVICE_DELAY
          value: "0"
        - name: TOGGLE_CANARY_DELAY
          value: "0"
        - name: TOGGLE_CANARY_FAILURE
          value: "0"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /favorites
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: python-favorite
  namespace: elastiflix
spec:
  selector:
    app: python-favorite
  ports:
  - port: 5000
    targetPort: 5000
