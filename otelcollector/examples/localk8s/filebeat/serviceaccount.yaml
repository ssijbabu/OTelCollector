apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: filebeat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
- apiGroups: [""]
  resources: [namespaces, nodes, pods, events]
  verbs: [get, watch, list]
- apiGroups: ["apps"]
  resources: [replicasets, statefulsets, daemonsets, deployments]
  verbs: [get, watch, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
- kind: ServiceAccount
  name: filebeat
  namespace: filebeat
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
