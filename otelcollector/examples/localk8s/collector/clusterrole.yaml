apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  # k8sclusterreceiver — watches cluster-level objects
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - namespaces
      - replicationcontrollers
      - resourcequotas
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  # k8sattributesprocessor — resolves pod metadata from IPs
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  # kubeletstatsreceiver — reads node stats via kubelet API
  - apiGroups: [""]
    resources: [nodes/stats, nodes/proxy]
    verbs: [get]
  - apiGroups: [""]
    resources: [nodes/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: otel-collector
