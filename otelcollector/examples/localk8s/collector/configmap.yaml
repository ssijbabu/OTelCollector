apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: otel-collector
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      file_storage:
        directory: /var/lib/otelcol/file_storage

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include:
          - /var/log/pods/elastiflix_*/*/*.log
          - /var/log/pods/otel-demo_*/*/*.log
        include_file_path: true
        include_file_name: false
        storage: file_storage
        operators:
          - type: json_parser
            id: parse-docker
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z'
          - type: move
            id: move-log-body
            from: attributes.log
            to: body
          - type: remove
            id: remove-stream
            field: attributes.stream
          - type: remove
            id: remove-time
            field: attributes.time
          - type: json_parser
            id: parse-app-json
            if: 'body matches "^\\{"'
            on_error: send
          - type: regex_parser
            id: parse-filepath
            parse_from: attributes["log.file.path"]
            regex: '^/var/log/pods/(?P<k8s_namespace>[^_]+)_(?P<k8s_pod_name>[^_]+)_[^/]+/(?P<k8s_container_name>[^/]+)/'
            on_error: send
          - type: move
            id: move-ns
            from: attributes.k8s_namespace
            to: resource["k8s.namespace.name"]
          - type: move
            id: move-pod
            from: attributes.k8s_pod_name
            to: resource["k8s.pod.name"]
          - type: move
            id: move-container
            from: attributes.k8s_container_name
            to: resource["k8s.container.name"]

      # Watches Kubernetes API for cluster-level resource metrics
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, NetworkUnavailable]
        allocatable_types_to_report: [cpu, memory, storage, ephemeral-storage]
        resource_attributes:
          k8s.namespace.name:
            enabled: true
          k8s.pod.name:
            enabled: true
          k8s.node.name:
            enabled: true
          k8s.deployment.name:
            enabled: true
          k8s.daemonset.name:
            enabled: true
          k8s.statefulset.name:
            enabled: true
          k8s.replicaset.name:
            enabled: true
          k8s.job.name:
            enabled: true

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50

      batch:
        send_batch_size: 256
        timeout: 2s

      # Enriches spans/logs/metrics from apps with k8s pod metadata
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      transform/set-service-name:
        log_statements:
          - context: resource
            statements:
              - 'set(attributes["service.name"], attributes["k8s.container.name"]) where attributes["service.name"] == nil'

    exporters:
      kafka:
        brokers: ["kafka-client.kafka.svc.cluster.local:9092"]
        protocol_version: "3.0.0"
        logs:
          topic: otel-logs
          encoding: otlp_json
        metrics:
          topic: otel-metrics
          encoding: otlp_json
        traces:
          topic: otel-traces
          encoding: otlp_json
      debug:
        verbosity: basic

    service:
      extensions: [health_check, file_storage]
      telemetry:
        logs:
          level: info
      pipelines:
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, k8sattributes, batch, transform/set-service-name]
          exporters: [kafka, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [kafka, debug]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [kafka, debug]
        # Separate pipeline for cluster-level k8s metrics
        metrics/k8s_cluster:
          receivers: [k8s_cluster]
          processors: [memory_limiter, batch]
          exporters: [kafka, debug]
