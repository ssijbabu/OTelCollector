apiVersion: v1
kind: Secret
metadata:
  name: elastic-secret-otel
  namespace: opentelemetry-operator-system
type: Opaque
stringData:
  # Elasticsearch URL reachable from within the cluster.
  elastic_endpoint: "http://elasticsearch.elastic.svc.cluster.local:9200"
  # Base64-encoded Elasticsearch API key.
  # Generate: POST /_security/api_key {"name":"otel-kube-stack","role_descriptors":{}}
  # Then base64-encode the "encoded" field from the response.
  elastic_api_key: "REPLACE_WITH_BASE64_ENCODED_API_KEY"
