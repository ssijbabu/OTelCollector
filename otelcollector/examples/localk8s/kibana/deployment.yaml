apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: elastic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.17.3
        env:
        - name: ELASTICSEARCH_HOSTS
          value: http://elasticsearch.elastic.svc.cluster.local:9200
        - name: SERVER_NAME
          value: kibana
        - name: ELASTICSEARCH_USERNAME
          value: kibana_system
        - name: ELASTICSEARCH_PASSWORD
          value: kibana123
        - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
          value: "a7f3d2e1b8c4f6a9d0e2b5c8f1a4d7e0b3c6f9a2d5e8b1c4f7a0d3e6b9c2f5a8"
        - name: XPACK_SECURITY_ENCRYPTIONKEY
          value: "b8c4f7a1d5e9b2c6f0a3d7e1b4c8f2a5d9e3b6c0f4a7d1e5b9c3f6a0d4e8b2c5"
        - name: XPACK_REPORTING_ENCRYPTIONKEY
          value: "c9d5e8b2f6a0c3d7e1b5f9a2d6e0b4c7f1a4d8e2b6f0a3c7d1e5b9f2a6c0d4e8"
        - name: XPACK_APM_SEARCHAGGREGATEDTRANSACTIONS
          value: "auto"
        ports:
        - name: http
          containerPort: 5601
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /api/status
            port: http
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
          timeoutSeconds: 10
