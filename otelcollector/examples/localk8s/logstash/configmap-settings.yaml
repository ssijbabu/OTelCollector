apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-settings
  namespace: logstash
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    xpack.monitoring.enabled: false
    pipeline.workers: 2
    pipeline.batch.size: 125
    pipeline.batch.delay: 50
    log.level: info
