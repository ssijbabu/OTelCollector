apiVersion: apps/v1
kind: Deployment
metadata:
  name: apm-server
  namespace: elastic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apm-server
  template:
    metadata:
      labels:
        app: apm-server
    spec:
      containers:
      - name: apm-server
        image: docker.elastic.co/apm/apm-server:8.17.3
        args:
        - --strict.perms=false
        - -e
        - -c
        - /usr/share/apm-server/apm-server.yml
        ports:
        - name: http
          containerPort: 8200
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /usr/share/apm-server/apm-server.yml
          subPath: apm-server.yml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: apm-server-config
